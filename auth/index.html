<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyCouponBag</title>
  <link rel="icon" type="image/png" href="../imgs/mcb-logo.png">
  <link rel="shortcut icon" type="image/png" href="../imgs/mcb-logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* Neo-Brutalist theme (align with index) */
    :root {
      --purple: #6A0DAD;
      --black: #111111;
      --offwhite: #F4F4F0;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--offwhite);
      color: var(--black);
      min-height: 100vh;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .glass {
      background: #fff;
      border: 3px solid var(--black);
      border-radius: 0;
      box-shadow: 6px 6px 0 0 var(--black);
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
    }
    h2 {
      color: var(--purple);
      font-size: 2.2rem;
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: 800;
    }
    .modern-button {
      background: var(--purple);
      color: white;
      font-weight: 800;
      padding: 0.75rem 2rem;
      border: 3px solid var(--black);
      border-radius: 0;
      box-shadow: 5px 5px 0 0 var(--black);
      transition: transform 0.15s, box-shadow 0.15s;
      font-size: 1.1rem;
      cursor: pointer;
      width: 100%;
      margin-top: 1rem;
    }
    .modern-button:hover:not(:disabled) {
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0 0 var(--black);
    }
    .modern-button:active:not(:disabled) { transform: scale(0.98); }
    .modern-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .message {
      margin-top: 1.5rem;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
      min-height: 1.5em;
      line-height: 1.5;
    }
    .success {
      color: #16a34a;
    }
    .error {
      color: #dc2626;
    }
    label {
      font-weight: 700;
      margin-bottom: 0.5rem;
      display: block;
      color: var(--black);
    }
    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 3px solid var(--black);
      margin-bottom: 1rem;
      font-size: 1rem;
      background: #fff;
      color: var(--black);
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>
<body>
  <div class="glass">
    <h2>MyCouponBag v1.0.1</h2>
    <form id="resetForm" style="display:none;">
      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" name="newPassword" required minlength="6" placeholder="Enter new password" />
      <button type="submit" class="modern-button" id="submitBtn">Update Password</button>
    </form>
    <div id="message" class="message"></div>
  </div>
  <!-- Load Supabase CDN first -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
  <!-- Then run your custom script -->
  <script>
    // Parse auth params first (no Supabase dependency) so we can show verification success even if Supabase fails to load.
    var hashPart = window.location.hash.substring(1);
    var searchPart = window.location.search.substring(1);
    var params = new URLSearchParams(hashPart + (hashPart && searchPart ? '&' : '') + searchPart);
    var access_token = params.get('access_token');
    var refresh_token = params.get('refresh_token');
    var type = params.get('type');
    var token_hash = params.get('token_hash');
    var error = params.get('error');
    var resetForm = document.getElementById('resetForm');
    var messageDiv = document.getElementById('message');
    var submitBtn = document.getElementById('submitBtn');

    if (error) {
      messageDiv.innerHTML = '<span class="error">Error Occurred, please try again later.<br>For more help: support@mycouponbag.com</span>';
      messageDiv.className = 'message error';
    } else {
      var isEmailConfirm = type === 'signup' || type === 'email_confirm' || type === 'email';
      if (isEmailConfirm) {
        if (resetForm) resetForm.style.display = 'none';
        messageDiv.innerHTML = '<span class="success">Your email has been verified, please login the app.</span>';
        messageDiv.className = 'message success';
      }
    }

    // === SUPABASE: use the project that sends auth emails (signup + password reset) ===
    // Your links point to irpgohwdtkvjyuohybyu – URL and anon key must match that project.
    // Get anon key: Supabase Dashboard → project irpgohwdtkvjyuohybyu → Settings → API → anon public.
    var SUPABASE_URL = 'https://irpgohwdtkvjyuohybyu.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlycGdvaHdkdGt2anl1b2h5Ynl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTExOTAwODEsImV4cCI6MjA2Njc2NjA4MX0.ODjKyLH1Gu0GIlBN5aT2cL2LHW3jGyhsgDZ5GWvkG3E';
    var supabase = window.supabase && window.supabase.createClient ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    async function setSessionAndShowForm() {
      if (!access_token || !refresh_token || type !== 'recovery') {
        messageDiv.innerHTML = '<span class="error">Invalid or missing reset token.<br>Please use the link from your email, or request a new password reset.</span>';
        messageDiv.className = 'message error';
        return;
      }
      try {
        const { data, error } = await supabase.auth.setSession({ access_token, refresh_token });
        if (error) {
          messageDiv.innerHTML = '<span class="error">Error Occurred, please try again later.<br>For more help: support@mycouponbag.com</span>';
          messageDiv.className = 'message error';
          return;
        }
        // Show the form
        resetForm.style.display = 'block';
      } catch (err) {
        messageDiv.innerHTML = '<span class="error">Error Occurred, please try again later.<br>For more help: support@mycouponbag.com</span>';
        messageDiv.className = 'message error';
      }
    }

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      messageDiv.textContent = '';
      const newPassword = document.getElementById('newPassword').value;
      try {
        const { data, error } = await supabase.auth.updateUser({ password: newPassword });
        if (error) {
          messageDiv.innerHTML = '<span class="error">Error Occurred, please try again later.<br>For more help: support@mycouponbag.com</span>';
          messageDiv.className = 'message error';
        } else {
          messageDiv.textContent = 'Password updated successfully! You can now log in with your new password.';
          messageDiv.className = 'message success';
          resetForm.style.display = 'none';
        }
      } catch (err) {
        messageDiv.innerHTML = '<span class="error">Error Occurred, please try again later.<br>For more help: support@mycouponbag.com</span>';
        messageDiv.className = 'message error';
      }
      submitBtn.disabled = false;
    });

    // Run async auth flow inside an async IIFE. Top-level await is invalid in classic scripts,
    // so the script would throw and never set the message without this wrapper.
    (async function runAuthFlow() {
      // Success message for email confirm is already shown in the sync block above.
      var isEmailConfirm = type === 'signup' || type === 'email_confirm' || type === 'email';
      if (isEmailConfirm && supabase) {
        try {
          if (access_token && refresh_token) {
            await supabase.auth.setSession({ access_token, refresh_token });
          } else if (token_hash) {
            await supabase.auth.verifyOtp({ token_hash: token_hash, type: type });
          }
        } catch (err) { /* session storage is optional; message already shown */ }
      } else if (type === 'recovery' && supabase) {
        await setSessionAndShowForm();
      }
    })();
  </script>
</body>
</html>
